build:
  maxIssues: 0

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 15
    # Spark integration and serialization dispatch methods are inherently branchy
    excludes: [ '**/test/**', '**/demo/**' ]
  LongMethod:
    active: true
    threshold: 60
    excludes: [ '**/test/**', '**/demo/**' ]
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8
    excludes: [ '**/test/**' ]
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 20
    excludes: [ '**/test/**', '**/demo/**' ]

potential-bugs:
  active: true
  AvoidReferentialEquality:
    active: true
  DontDowncastCollectionTypes:
    active: true
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  EqualsWithHashCodeExist:
    active: true
  ExplicitGarbageCollectionCall:
    active: true
    # Intentional pre-measurement GC in benchmark and cache performance tests
    excludes: [ '**/benchmark/**', '**/ReflectionCacheTest.kt', '**/ReflectionCacheStabilityTest.kt', '**/SerializationCachePerformanceTest.kt', '**/SerializationCacheStabilityTest.kt', '**/MultiScaleBenchmarkTest.kt', '**/BackendBenchmarkTest.kt' ]
  NullCheckOnMutableProperty:
    active: true
  UnreachableCode:
    active: true
  UnsafeCallOnNullableType:
    active: true
    excludes: [ '**/test/**', '**/demo/**' ]
  UnsafeCast:
    active: true

style:
  active: true
  MagicNumber:
    active: true
    excludes: [ '**/test/**', '**/demo/**' ]
    ignoreNumbers: [ '-1', '0', '1', '2', '10', '100', '1000' ]
  UnusedImports:
    active: true
  UnusedPrivateMember:
    active: true

# Formatting rules are owned by ktlint-gradle (ktlint 1.x).
# detekt-formatting bundles ktlint 0.x which conflicts on continuation indent style.
# Keeping this section disabled prevents duplicate, contradictory formatting violations.
formatting:
  active: false
