# Plain Spark 4.0 Configuration
# Unity Catalog integration is done via REST API only (no Spark connector)

# Delta Lake extensions — required for df.write().format("delta") and SQL delta.`path` syntax
spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog

# Additional Spark settings for better performance
spark.sql.adaptive.enabled=true
spark.sql.adaptive.coalescePartitions.enabled=true
