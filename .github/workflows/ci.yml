name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Semgrep security scan ────────────────────────────────────────────────────
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Semgrep
        run: pip install semgrep==1.159.0

      - name: Run Semgrep
        run: |
          mkdir -p build/reports/semgrep
          semgrep \
            --config "p/owasp-top-ten" \
            --config "p/default" \
            --config "p/security-audit" \
            --config "p/secrets" \
            --severity ERROR \
            --error \
            --json \
            --output build/reports/semgrep/results.json \
            .

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: build/reports/semgrep/results.json
          retention-days: 7

  # ── Detekt static analysis ───────────────────────────────────────────────────
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Upload Detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: build/reports/detekt/
          retention-days: 7
